name: Monochrome

on:
  pull_request:
    branches: ["dev", "main"]

jobs:
  build:
    name: Build and Test
    runs-on: macos-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/mise
            ~/.config/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('**/.tuist-version') }}
          restore-keys: ${{ runner.os }}-mise-

      - run: |
          ./.github/build.sh
          ./.github/lint.sh
          ./.github/test.sh
